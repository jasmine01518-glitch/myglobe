<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globe Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- 3D Globe Canvas + CSS2D Overlay -->
    <div id="globe-container">
      <canvas id="globe-canvas"></canvas>
      <!-- CSS2DRenderer will append its overlay here via JS -->
    </div>

    <!-- Intro tagline (top-left) -->
    <div id="tagline">
      <span>MyGlobe</span>
      <p>Drag to explore your memories.</p>
    </div>

    <!-- Upload Panel (bottom-center) -->
    <div id="upload-panel">

      <!-- Location Dropdown — floats above the panel -->
      <div id="location-dropdown" class="hidden">
        <div class="dropdown-section" id="recent-section">
          <div class="dropdown-section-label">RECENT</div>
          <div class="dropdown-list" id="recent-list"></div>
        </div>
        <div class="dropdown-section" id="suggested-section">
          <div class="dropdown-section-label">SUGGESTED</div>
          <div class="dropdown-list" id="suggested-list"></div>
        </div>
      </div>

      <div id="panel-header">
        <span class="label">ADD MEMORY</span>
      </div>
      <div id="panel-form">
        <!-- Location search wrapper -->
        <div id="location-wrapper">
          <input
            type="text"
            id="location-input"
            placeholder="Type City/Country"
            autocomplete="off"
            spellcheck="false"
          >
          <span id="loc-check" class="location-checkmark">✓</span>
        </div>
        <div id="upload-area">
          <input type="file" id="file-input" accept="image/*" multiple>
          <label for="file-input" id="file-label">Gallery</label>
        </div>
        <button id="save-btn">Upload</button>
      </div>
      <!-- Thumbnail preview of selected files -->
      <div id="preview-container"></div>
    </div>

    <!-- Photo count indicator (top-right) -->
    <div id="photo-count">
      <span id="count-number">0</span>
      <span class="label">PHOTOS</span>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="hidden">
      <div id="lightbox-overlay"></div>
      <div id="lightbox-content">
        <button id="lightbox-close" aria-label="닫기">&#x2715;</button>
        <img id="lightbox-img" src="" alt="">
        <div id="lightbox-info">
          <p id="lightbox-location"></p>
          <p id="lightbox-date"></p>
        </div>
        <button id="lightbox-delete">삭제</button>
      </div>
    </div>

  </div>

  <!-- Three.js core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- CSS2DRenderer for HTML labels on the 3D globe -->
  <script src="https://unpkg.com/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
  <script src="script.js"></script>
</body>
</html>
