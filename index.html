<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globe Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- 3D Globe Canvas + CSS2D Overlay -->
    <div id="globe-container">
      <canvas id="globe-canvas"></canvas>
      <!-- CSS2DRenderer will append its overlay here via JS -->
    </div>

    <!-- Intro tagline (top-left) -->
    <div id="tagline">
      <span>TRAVEL ARCHIVE</span>
      <p>지구본을 드래그해 여행 기억을 탐색하세요</p>
    </div>

    <!-- Upload Panel (bottom-center) -->
    <div id="upload-panel">
      <div id="panel-header">
        <span class="label">ADD MEMORY</span>
      </div>
      <div id="panel-form">
        <input
          type="text"
          id="location-input"
          placeholder="도시 또는 나라 (예: Tokyo, Iceland)"
          autocomplete="off"
          spellcheck="false"
        >
        <div id="upload-area">
          <input type="file" id="file-input" accept="image/*" multiple>
          <label for="file-input" id="file-label">사진 선택</label>
        </div>
        <button id="save-btn">저장</button>
      </div>
      <!-- Thumbnail preview of selected files -->
      <div id="preview-container"></div>
    </div>

    <!-- Photo count indicator (top-right) -->
    <div id="photo-count">
      <span id="count-number">0</span>
      <span class="label">PHOTOS</span>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="hidden">
      <div id="lightbox-overlay"></div>
      <div id="lightbox-content">
        <button id="lightbox-close" aria-label="닫기">&#x2715;</button>
        <img id="lightbox-img" src="" alt="">
        <div id="lightbox-info">
          <p id="lightbox-location"></p>
          <p id="lightbox-date"></p>
        </div>
        <button id="lightbox-delete">삭제</button>
      </div>
    </div>

  </div>

  <!-- Three.js core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- CSS2DRenderer for HTML labels on the 3D globe -->
  <script src="https://unpkg.com/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
  <script src="script.js"></script>
</body>
</html>
